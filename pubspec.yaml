name: nesab
description: "Nesab - Islamic Financial Products Platform"
publish_to: 'none'
version: 1.0.4+0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  get_it: ^9.2.0
  injectable: ^2.5.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  go_router: ^17.1.0
  shared_preferences: ^2.3.0
  cloud_firestore: ^6.1.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  flutter_svg: ^2.0.17
  font_awesome_flutter: ^10.8.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  liquid_glass_easy: ^1.1.1
  cloud_functions: ^6.0.7
  http: ^1.2.0
  flutter_inappwebview: ^6.1.5
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  firebase_analytics: ^12.2.0
  firebase_storage: ^13.2.0
  image_picker: ^1.2.1
  share_plus: ^13.0.0
  firebase_messaging: ^16.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0
  freezed: ^3.2.5
  injectable_generator: ^2.6.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: ReadexPro
      fonts:
        - asset: assets/fonts/ReadexPro-Variable.ttf
